<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;color:#1a1a1a;-webkit-text-size-adjust:100%}
.app{max-width:720px;margin:0 auto;padding:1rem .75rem 5rem}

.mob-nav-btn.active{color:#1565C0;border-color:#1976D2;background:#E3F2FD}
.eq{display:inline-flex;align-items:flex-end;gap:5px;height:48px;margin-bottom:1.25rem}
.eq span{width:10px;border-radius:4px;background:#1D9E75;animation:eq 1s ease-in-out infinite}
.eq span:nth-child(1){animation-delay:0s}.eq span:nth-child(2){animation-delay:.15s}.eq span:nth-child(3){animation-delay:.3s}.eq span:nth-child(4){animation-delay:.45s}.eq span:nth-child(5){animation-delay:.6s}
@keyframes eq{0%,100%{height:8px}50%{height:44px}}
.saving-overlay{position:fixed;inset:0;background:rgba(245,245,245,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.saving-overlay.hidden{display:none}

<body>
<div class="app">
<div id="header-root"></div>
<div class="main-tabs" id="main-tabs-bar"></div>
<div id="root"><div class="spin">Cargando...</div></div>
<div class="saving-overlay hidden" id="saving-overlay"><div class="eq"><span></span><span></span><span></span><span></span><span></span></div><p style="font-size:16px;font-weight:500;color:#555;margin-top:.5rem">Guardando...</p></div>
</div>
<nav class="mob-nav" id="mob-nav">
  <button class="mob-nav-btn active" id="mobtab-general" onclick="setTab('general')">General</button>
  <button class="mob-nav-btn" id="mobtab-ensayos" onclick="setTab('ensayos')">Ensayos</button>
  <button class="mob-nav-btn" id="mobtab-setlist" onclick="setTab('setlist')">Canciones</button>
  <button class="mob-nav-btn" id="mobtab-eventos" onclick="setTab('eventos')">Eventos</button>
</nav>
<script>
var WEBAPP_URL="https://script.google.com/macros/s/AKfycbyG5teyvjr-SAOlHTlmvidzbFl2QCkGjVZco_M6R4ORhhA6T_jXxfS3rBJaYiW1SFzB/exec";
var START_VIEW="home";
var HOURS=["18","19","20","21","22","23"];
var TODAY=(function(){var t=new Date();t.setHours(0,0,0,0);return t;})();
var state={mainTab:"general",view:START_VIEW,myName:localStorage.getItem("banda_myname")||"",myPin:localStorage.getItem("banda_mypin")||"",pinError:"",editingName:false,bandName:"Mi Banda",editingBandName:false,avail:{},allData:{},members:[],rehearsals:[],events:[],setlist:[],dragSrc:null,selectedWeek:0,minMembers:2,saving:false,loading:false,error:null,viewingMember:"",editingAs:"",initialLoading:true,confirmRemove:null,editingListName:-1,editingSong:"",photos:{},confirmPhotoRemove:"",viewingSong:null,editingSongDetail:false,activity:[],showAllActivity:false,darkMode:localStorage.getItem("banda_dark")==="1",lyricsFontSize:parseInt(localStorage.getItem("banda_lyricsfs")||"13",10)};
function getDays(){var dow=TODAY.getDay(),diff=dow===0?-6:1-dow;var mon=new Date(TODAY);mon.setDate(TODAY.getDate()+diff);var days=[];for(var i=0;i<42;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d);}return days;}
function fmtDate(d){var D=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];var M=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];return D[d.getDay()]+" "+d.getDate()+" "+M[d.getMonth()];}
function fmtDateStr(s){var d=new Date(s+"T12:00:00");return fmtDate(d);}
function dKey(d){return d.toISOString().split("T")[0];}
function isPastDay(d){return d<TODAY;}
function toggleHour(dk,h){if(!state.avail[dk])state.avail[dk]=[];var i=state.avail[dk].indexOf(h);if(i>=0)state.avail[dk].splice(i,1);else state.avail[dk].push(h);render();}
function toggleDay(dk){var cur=state.avail[dk]||[];state.avail[dk]=cur.length===HOURS.length?[]:HOURS.slice();render();}
function showSaving(v){var o=document.getElementById("saving-overlay");if(o)o.className="saving-overlay"+(v?"":" hidden");}
function apiCall(data){var writeActions=["saveAvailability","saveSetlist","saveBandName","saveRehearsal","removeRehearsal","saveEvent","removeEvent","removeMember","checkPin","savePhoto","removePhoto","logEvent"];var isWrite=writeActions.indexOf(data.action)>=0;return new Promise(function(resolve,reject){var done=false;var x=new XMLHttpRequest();var timer=setTimeout(function(){if(!done){done=true;reject(new Error("Timeout"));}},30000);x.onerror=function(){clearTimeout(timer);if(!done){done=true;reject(new Error("Error de red"));}};x.onload=function(){clearTimeout(timer);if(done)return;done=true;try{var t=x.responseText;var m=t.match(/^[a-zA-Z0-9_]+\((.+)\)$/s);var j=m?JSON.parse(m[1]):JSON.parse(t);if(!j.ok)reject(new Error(j.error||"Error"));else resolve(j);}catch(e){reject(new Error("Parse error: "+e.message));}};if(isWrite){x.open("POST",WEBAPP_URL,true);x.setRequestHeader("Content-Type","text/plain");x.send(JSON.stringify(data));}else{var params="action="+encodeURIComponent(data.action)+"&data="+encodeURIComponent(JSON.stringify(data));x.open("GET",WEBAPP_URL+"?"+params,true);x.send();}});}
function loadData(){state.loading=true;render();return Promise.all([apiCall({action:"getAvailability"}),apiCall({action:"getMembers"}),apiCall({action:"getBandConfig"})]).then(function(r){state.allData=r[0].data||{};state.members=r[1].members||[];state.bandName=r[2].bandName||"Mi Banda";state.rehearsals=r[2].rehearsals||[];state.events=r[2].events||[];state.setlist=r[2].setlist||[];state.photos=r[2].photos||{};state.activity=r[2].activity||[];state.error=null;}).catch(function(e){state.error=e.message;}).then(function(){state.initialLoading=false;state.loading=false;render();});}
function saveAvailability(){var saveName=state.editingAs||state.myName;if(!saveName)return;state.saving=true;showSaving(true);render();var slots=[];Object.keys(state.avail).forEach(function(f){state.avail[f].forEach(function(h){slots.push({fecha:f,hora:h});});});apiCall({action:"saveAvailability",nombre:saveName,pin:state.editingAs?"":state.myPin,adminEdit:!!state.editingAs,slots:slots}).then(function(){return loadData();}).then(function(){state.view="home";state.editingAs="";state.saving=false;showSaving(false);render();}).catch(function(e){state.error=e.message;state.saving=false;showSaving(false);render();});}
function verifyPin(){var nameEl=document.getElementById("pin-name");var pinEl=document.getElementById("pin-code");var name=nameEl?nameEl.value.trim():"";var pin=pinEl?pinEl.value.trim():"";if(!name||!pin){state.pinError="Ingresa nombre y PIN";render();return;}if(pin.length<4){state.pinError="PIN debe tener al menos 4 caracteres";render();return;}state.pinError="Verificando...";render();apiCall({action:"checkPin",nombre:name,pin:pin}).then(function(r){if(r.notFound){state.pinError="Nombre no encontrado.";}else if(!r.match){state.pinError="PIN incorrecto";}else{state.myName=name;state.myPin=pin;state.pinError="";localStorage.setItem("banda_myname",name);localStorage.setItem("banda_mypin",pin);if(state.allData[name])state.avail=JSON.parse(JSON.stringify(state.allData[name]));}render();}).catch(function(e){state.pinError=e.message;render();});}
function savePin(){var input=document.getElementById("new-pin");var pin=input?input.value.trim():"";if(pin.length<4){alert("El PIN debe tener al menos 4 caracteres");return;}apiCall({action:"checkPin",nombre:state.myName,pin:pin}).then(function(){state.myPin=pin;localStorage.setItem("banda_mypin",pin);render();}).catch(function(e){alert("Error: "+e.message);});}

var CHORD_NOTES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
var FLAT_TO_SHARP={"Db":"C#","Eb":"D#","Gb":"F#","Ab":"G#","Bb":"A#","Cb":"B","Fb":"E"};
var CHORD_TOKEN_RE=/^[A-G][#b]?(m|M|maj|Maj|min|dim|aug|sus|add)?[0-9]*(sus[24]?)?(add[0-9]+)?(\/[A-G][#b]?)?$/;
function isChordLine(line){var t=(line||"").trim();if(!t)return false;if(t.length>80)return false;var tokens=t.split(/\s+/);if(tokens.length===0)return false;var hasChord=false;var ok=tokens.every(function(tok){var stripped=tok.replace(/^[\(\[\|]+/,"").replace(/[\)\]\|\,\.]+$/,"");if(stripped==="")return true;if(CHORD_TOKEN_RE.test(stripped)){hasChord=true;return true;}return false;});return ok&&hasChord;}
function transposeChordToken(tok,n){return tok.replace(/([A-G][b#]?)/g,function(note){var norm=FLAT_TO_SHARP[note]||note;var idx=CHORD_NOTES.indexOf(norm);if(idx<0)return note;return CHORD_NOTES[(idx+n+120)%12];});}
function transposeLyrics(text,n){if(!text||!n)return text;return text.split("\n").map(function(line){if(!isChordLine(line))return line;return line.replace(/\S+/g,function(tok){return transposeChordToken(tok,n);});}).join("\n");}
