<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Malchos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;color:#1a1a1a;-webkit-text-size-adjust:100%}
.app{max-width:720px;margin:0 auto;padding:1rem .75rem 5rem}
@media(max-width:600px){.app{padding:.75rem .75rem 5rem}}
.card{background:#fff;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;border:1px solid #e8e8e8}
@media(max-width:600px){.card{padding:.9rem 1rem;border-radius:14px}}
.stitle{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
input[type=text],input[type=password],input[type=date],select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ddd;font-size:15px;outline:none;background:#fafafa}
@media(max-width:600px){input[type=text],input[type=password],input[type=date],select{font-size:16px;padding:12px 14px}}
input:focus,select:focus{border-color:#1D9E75;background:#fff}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #ddd;background:transparent;color:#1a1a1a}
.btn:hover{background:#f0f0f0}
@media(max-width:600px){.btn{padding:11px 20px;font-size:15px}}
.btnp{background:#1a1a1a;color:#fff;border-color:transparent}.btnp:hover{background:#333}
.btns{padding:5px 12px;font-size:12px}
@media(max-width:600px){.btns{padding:7px 14px;font-size:13px}}
.btnd{background:#FFF0F0;color:#A32D2D;border-color:#F09595}.btnd:hover{background:#FCEBEB}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:.75rem}
.main-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
@media(max-width:600px){.main-tabs{gap:5px}}
.main-tab{padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid #ccc;border-radius:8px;background:transparent;color:#999;white-space:nowrap;transition:.15s}
@media(max-width:600px){.main-tab{padding:9px 14px;font-size:14px;flex:1;text-align:center}}
.main-tab:hover{border-color:#888;color:#444;background:#f5f5f5}
.main-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #e0e0e0;background:transparent;color:#666}
@media(max-width:600px){.tab{padding:9px 16px;font-size:14px}}
.taba{background:#1a1a1a;color:#fff;border-color:transparent}
.dblock{margin-bottom:1rem}
.dlabel{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
@media(max-width:600px){.dlabel{font-size:15px}}
.hours{display:flex;flex-wrap:wrap;gap:6px}
.hbtn{width:48px;height:40px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #e0e0e0;background:#f8f8f8;color:#666}
@media(max-width:600px){.hbtn{width:52px;height:46px;font-size:15px;border-radius:9px}}
.hbtn.on{background:#1D9E75;border-color:#0F6E56;color:#fff;font-weight:600}
.hbtn.solo{background:#FFB300;border-color:#F59F00;color:#fff;font-weight:600}
.hbtn.past{background:#f0f0f0;color:#ccc;border-color:#e8e8e8;cursor:not-allowed;pointer-events:none}
.hbtn.readonly{cursor:default}
.coinc{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.coinc:last-child{border-bottom:none}
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.bg{background:#E1F5EE;color:#085041}.ba{background:#FAEEDA;color:#633806}.bgr{background:#F0F0F0;color:#555}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.chip{padding:2px 8px;border-radius:20px;font-size:11px;background:#f0f0f0;color:#666;border:1px solid #e8e8e8}
.notice{background:#E1F5EE;border:1px solid #9FE1CB;border-radius:8px;padding:10px 14px;font-size:13px;color:#085041;margin-bottom:1rem}
@media(max-width:600px){.notice{font-size:14px;padding:12px 14px}}
.empty{text-align:center;padding:2rem;color:#999;font-size:14px}
.lbox{background:#f5f5f5;border-radius:8px;padding:10px 12px;font-size:12px;color:#666;word-break:break-all;font-family:monospace;margin-top:8px;border:1px solid #e8e8e8}
.spin{text-align:center;padding:1.5rem;color:#999;font-size:14px}
.errbox{background:#FFF0F0;border:1px solid #FFAAAA;border-radius:8px;padding:10px 14px;font-size:13px;color:#800;margin-bottom:1rem}
.avatar{width:36px;height:36px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#085041;flex-shrink:0}
@media(max-width:600px){.avatar{width:40px;height:40px;font-size:17px}}
.pinbox{background:#F0F7FF;border:1px solid #B5D4F4;border-radius:8px;padding:10px 14px;font-size:13px;color:#0C447C;margin-top:.75rem}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:.75rem}
.stat-card{background:#f8f8f8;border-radius:10px;padding:.75rem 1rem;border:1px solid #e8e8e8;text-align:center}
.stat-num{font-size:28px;font-weight:600;color:#1a1a1a;line-height:1}
@media(max-width:600px){.stat-num{font-size:32px}}
.stat-label{font-size:12px;color:#888;margin-top:4px}
@media(max-width:600px){.stat-label{font-size:13px}}
.stat-sub{font-size:10px;color:#aaa;margin-top:3px;line-height:1.4}
.event-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0;flex-wrap:wrap}
.event-row:last-child{border-bottom:none}
.event-date{font-size:13px;font-weight:600;color:#1a1a1a;min-width:90px}
@media(max-width:600px){.event-date{font-size:14px}}
.event-name{font-size:13px;color:#666;flex:1}
@media(max-width:600px){.event-name{font-size:14px}}
.rehearsal-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;background:#E6F1FB;color:#0C447C;border:1px solid #B5D4F4}
.sl-gname{font-size:14px;font-weight:600;flex:1;border:none;background:transparent;outline:none;padding:2px 6px;border-radius:4px;min-width:0;color:#1a1a1a}
.sl-gname:hover{background:#f5f5f5}.sl-gname:focus{background:#fff;border:1px solid #1D9E75}
.sl-song{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;background:#fff;border:1px solid #e8e8e8;margin-bottom:4px;cursor:grab;user-select:none}
.sl-song.dov{border:2px dashed #1D9E75;background:#f0fdf8}
.sl-done .sl-stitle,.sl-done .sl-sartist{text-decoration:line-through;opacity:.5}
.sl-stitle{font-size:14px;font-weight:500;color:#1a1a1a}
.sl-sartist{font-size:12px;color:#888}
.sl-chk{width:18px;height:18px;cursor:pointer;flex-shrink:0}
@media(max-width:600px){.sl-chk{width:22px;height:22px}}
.admin-banner{background:#FFF3E0;border:1px solid #FFCC80;border-radius:8px;padding:10px 14px;font-size:13px;color:#7A4500;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
.eq{display:inline-flex;align-items:flex-end;gap:5px;height:48px;margin-bottom:1.25rem}
.eq span{width:10px;border-radius:4px;background:#1D9E75;animation:eq 1s ease-in-out infinite}
.eq span:nth-child(1){animation-delay:0s}.eq span:nth-child(2){animation-delay:.15s}.eq span:nth-child(3){animation-delay:.3s}.eq span:nth-child(4){animation-delay:.45s}.eq span:nth-child(5){animation-delay:.6s}
@keyframes eq{0%,100%{height:8px}50%{height:44px}}
</style>
</head>
<body>
<div class="app">
<div id="header-root"></div>
<div class="main-tabs" id="main-tabs-bar"></div>
<div id="root"><div class="spin">Cargando...</div></div>
</div>
<script>
var WEBAPP_URL="https://script.google.com/macros/s/AKfycbwAqMIcTw1q7NrdNlKATwNtl2EJdEA32O5Nsmz1S_9-1CkOEb-PeZ9I56wLqrSoD2fNWQ/exec";
var START_VIEW="home";
var HOURS=["18","19","20","21","22","23"];
var TODAY=(function(){var t=new Date();t.setHours(0,0,0,0);return t;})();
var state={mainTab:"general",view:START_VIEW,myName:localStorage.getItem("banda_myname")||"",myPin:localStorage.getItem("banda_mypin")||"",pinError:"",editingName:false,bandName:"Mi Banda",editingBandName:false,avail:{},allData:{},members:[],rehearsals:[],events:[],setlist:[],dragSrc:null,selectedWeek:0,minMembers:2,saving:false,loading:false,error:null,viewingMember:"",editingAs:"",initialLoading:true,confirmRemove:null};
function getDays(){var dow=TODAY.getDay(),diff=dow===0?-6:1-dow;var mon=new Date(TODAY);mon.setDate(TODAY.getDate()+diff);var days=[];for(var i=0;i<42;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d);}return days;}
function fmtDate(d){var D=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];var M=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];return D[d.getDay()]+" "+d.getDate()+" "+M[d.getMonth()];}
function fmtDateStr(s){var d=new Date(s+"T12:00:00");return fmtDate(d);}
function dKey(d){return d.toISOString().split("T")[0];}
function isPastDay(d){return d<TODAY;}
function toggleHour(dk,h){if(!state.avail[dk])state.avail[dk]=[];var i=state.avail[dk].indexOf(h);if(i>=0)state.avail[dk].splice(i,1);else state.avail[dk].push(h);render();}
function toggleDay(dk){var cur=state.avail[dk]||[];state.avail[dk]=cur.length===HOURS.length?[]:HOURS.slice();render();}
function apiCall(data){return fetch(WEBAPP_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body:JSON.stringify(data)}).then(function(r){return r.text();}).then(function(t){var j;try{j=JSON.parse(t);}catch(e){throw new Error("Respuesta invalida");}if(!j.ok)throw new Error(j.error||"Error");return j;});}
function loadData(){state.loading=true;render();return Promise.all([apiCall({action:"getAvailability"}),apiCall({action:"getMembers"}),apiCall({action:"getBandConfig"})]).then(function(r){state.allData=r[0].data||{};state.members=r[1].members||[];state.bandName=r[2].bandName||"Mi Banda";state.rehearsals=r[2].rehearsals||[];state.events=r[2].events||[];state.setlist=r[2].setlist||[];state.error=null;}).catch(function(e){state.error=e.message;}).then(function(){state.initialLoading=false;state.loading=false;render();});}
function saveAvailability(){var saveName=state.editingAs||state.myName;if(!saveName)return;state.saving=true;render();var slots=[];Object.keys(state.avail).forEach(function(f){state.avail[f].forEach(function(h){slots.push({fecha:f,hora:h});});});apiCall({action:"saveAvailability",nombre:saveName,pin:state.editingAs?"":state.myPin,adminEdit:!!state.editingAs,slots:slots}).then(function(){return loadData();}).then(function(){state.view="home";state.editingAs="";state.saving=false;render();}).catch(function(e){state.error=e.message;state.saving=false;render();});}
function verifyPin(){var nameEl=document.getElementById("pin-name");var pinEl=document.getElementById("pin-code");var name=nameEl?nameEl.value.trim():"";var pin=pinEl?pinEl.value.trim():"";if(!name||!pin){state.pinError="Ingresa nombre y PIN";render();return;}if(pin.length<4){state.pinError="PIN debe tener al menos 4 caracteres";render();return;}state.pinError="Verificando...";render();apiCall({action:"checkPin",nombre:name,pin:pin}).then(function(r){if(r.notFound){state.pinError="Nombre no encontrado.";}else if(!r.match){state.pinError="PIN incorrecto";}else{state.myName=name;state.myPin=pin;state.pinError="";localStorage.setItem("banda_myname",name);localStorage.setItem("banda_mypin",pin);if(state.allData[name])state.avail=JSON.parse(JSON.stringify(state.allData[name]));}render();}).catch(function(e){state.pinError=e.message;render();});}
function savePin(){var input=document.getElementById("new-pin");var pin=input?input.value.trim():"";if(pin.length<4){alert("El PIN debe tener al menos 4 caracteres");return;}apiCall({action:"checkPin",nombre:state.myName,pin:pin}).then(function(){state.myPin=pin;localStorage.setItem("banda_mypin",pin);render();}).catch(function(e){alert("Error: "+e.message);});}
function saveBandName(){var input=document.getElementById("bandname-input");var v=input?input.value.trim():"";if(!v)return;state.bandName=v;state.editingBandName=false;apiCall({action:"saveBandName",bandName:v}).catch(function(){});render();}
function removeMember(name){state.confirmRemove=null;apiCall({action:"removeMember",nombre:name}).then(function(){return loadData();}).catch(function(e){state.error=e.message;render();});}
function markRehearsal(date){apiCall({action:"saveRehearsal",date:date}).then(function(r){state.rehearsals=r.rehearsals||[];render();}).catch(function(e){alert("Error: "+e.message);});}
function unmarkRehearsal(date){apiCall({action:"removeRehearsal",date:date}).then(function(r){state.rehearsals=r.rehearsals||[];render();}).catch(function(e){alert("Error: "+e.message);});}
function addEvent(){var dateEl=document.getElementById("new-event-date");var nameEl=document.getElementById("new-event-name");var date=dateEl?dateEl.value:"";var name=nameEl?nameEl.value.trim():"";if(!date){alert("Elegi una fecha");return;}apiCall({action:"saveEvent",date:date,name:name}).then(function(r){state.events=r.events||[];render();}).catch(function(e){alert("Error: "+e.message);});}
function removeEvent(date){if(!confirm("Quitar este evento?"))return;apiCall({action:"removeEvent",date:date}).then(function(r){state.events=r.events||[];render();}).catch(function(e){alert("Error: "+e.message);});}
function viewMember(id){state.viewingMember=id;state.selectedWeek=0;state.view="memberView";render();}
function editMember(id){state.avail=state.allData[id]?JSON.parse(JSON.stringify(state.allData[id])):{};state.editingAs=id;state.selectedWeek=0;state.view="register";render();}
function slSave(){clearTimeout(window._slT);window._slT=setTimeout(function(){apiCall({action:"saveSetlist",setlist:state.setlist}).catch(function(){});},1000);}
function addGroup(){state.setlist.push({name:"Grupo nuevo",songs:[]});slSave();render();}
function removeGroup(gi){if(!confirm("Quitar este grupo?"))return;state.setlist.splice(gi,1);slSave();render();}
function updateGroupName(gi,v){state.setlist[gi].name=v;slSave();}
function addSong(gi){var tEl=document.getElementById("nst"+gi);var aEl=document.getElementById("nsa"+gi);var t=tEl?tEl.value.trim():"";var a=aEl?aEl.value.trim():"";if(!t)return;state.setlist[gi].songs.push({title:t,artist:a,done:false});if(tEl)tEl.value="";if(aEl)aEl.value="";slSave();render();}
function removeSong(gi,si){state.setlist[gi].songs.splice(si,1);slSave();render();}
function toggleDone(gi,si){state.setlist[gi].songs[si].done=!state.setlist[gi].songs[si].done;slSave();render();}
function slDS(e,gi,si){state.dragSrc={gi:gi,si:si};e.dataTransfer.effectAllowed="move";}
function slDO(e,gi,si){e.preventDefault();var el=document.getElementById("sl"+gi+"-"+si);if(el)el.classList.add("dov");return false;}
function slDL(gi,si){var el=document.getElementById("sl"+gi+"-"+si);if(el)el.classList.remove("dov");}
function slDrop(e,gi,si){e.stopPropagation();var src=state.dragSrc;if(!src||src.gi!==gi){return false;}var songs=state.setlist[gi].songs;var el=document.getElementById("sl"+gi+"-"+si);if(el)el.classList.remove("dov");if(src.si===si)return false;var moved=songs.splice(src.si,1)[0];songs.splice(si,0,moved);state.dragSrc=null;slSave();render();return false;}
function getCoincidences(){var days=getDays();var raw=[];days.forEach(function(d){var dk=dKey(d);HOURS.forEach(function(h){var present=state.members.filter(function(m){var av=state.allData[m.id];return av&&av[dk]&&av[dk].indexOf(h)>=0;});if(present.length>=state.minMembers)raw.push({date:d,hour:h,members:present,count:present.length});});});var groups=[];var i=0;while(i<raw.length){var block=[raw[i]];while(i+1<raw.length&&dKey(raw[i+1].date)===dKey(block[0].date)&&HOURS.indexOf(raw[i+1].hour)===HOURS.indexOf(block[block.length-1].hour)+1&&raw[i+1].members.map(function(m){return m.id;}).join(",")===block[0].members.map(function(m){return m.id;}).join(","))  {i++;block.push(raw[i]);}groups.push(block);i++;}return groups;}
function nextEventInfo(){var today=dKey(TODAY);var next=null;for(var i=0;i<state.events.length;i++){if(state.events[i].date>=today){next=state.events[i];break;}}var totalSongs=state.setlist.reduce(function(s,g){return s+g.songs.length;},0);var grpLines=state.setlist.map(function(g){return g.name+": "+g.songs.length;}).join(" / ");if(!next)return{weeks:null,rehearsalCount:0,totalSongs:totalSongs,grpLines:grpLines};var evDate=new Date(next.date+"T12:00:00");var diff=Math.ceil((evDate-TODAY)/(1000*60*60*24*7));var count=state.rehearsals.filter(function(r){return r>=today&&r<=next.date;}).length;return{weeks:diff,rehearsalCount:count,name:next.name,date:next.date,totalSongs:totalSongs,grpLines:grpLines};}
function renderHeader(){var el=document.getElementById("header-root");if(!el)return;if(state.editingBandName){el.innerHTML="<div style='margin-bottom:1rem'><div style='display:flex;align-items:center;gap:8px;flex-wrap:wrap'><h1 style='font-size:22px;font-weight:600'>&#127928;</h1><input type='text' id='bandname-input' value='"+state.bandName+"' style='font-size:18px;font-weight:600;padding:4px 10px;border-radius:8px;border:1px solid #1D9E75;max-width:220px' /><button class='btn btnp btns' onclick='saveBandName()'>Ok</button><button class='btn btns' onclick='state.editingBandName=false;render()'>&#10005;</button></div></div>";}else{el.innerHTML="<div style='display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap'><h1 style='font-size:22px;font-weight:600'>&#127928; "+state.bandName+"</h1><button class='btn btns' onclick='state.editingBandName=true;render()'>&#9999;&#65039;</button></div>";}var tb=document.getElementById("main-tabs-bar");if(!tb)return;tb.innerHTML=["General","Ensayos","Setlist","Eventos"].map(function(t,i){var id=["general","ensayos","setlist","eventos"][i];return "<button class='main-tab"+(state.mainTab===id?" active":"")+"' onclick='setTab(\""+id+"\")'>"+t+"</button>";}).join("");}
function setTab(tab){state.mainTab=tab;state.view="home";render();}
function render(){renderHeader();var el=document.getElementById("root");if(!el)return;if(state.initialLoading){var hh=document.getElementById("header-root");if(hh)hh.innerHTML="";var tb=document.getElementById("main-tabs-bar");if(tb)tb.innerHTML="";el.innerHTML="<div style='text-align:center;padding:5rem 1rem'><div class='eq'><span></span><span></span><span></span><span></span><span></span></div><p style='font-size:16px;font-weight:500;color:#555'>Cargando datos de la banda...</p></div>";return;}var err=state.error?"<div class='errbox'>"+state.error+"</div>":"";if(state.view==="memberView"){el.innerHTML=buildMemberView();return;}if(state.view==="register"){el.innerHTML=err+buildRegister();return;}if(state.view==="results"){el.innerHTML=err+buildResults();return;}if(state.mainTab==="general")el.innerHTML=err+buildGeneral();else if(state.mainTab==="ensayos")el.innerHTML=err+buildEnsayos();else if(state.mainTab==="setlist")el.innerHTML=buildSetlist();else if(state.mainTab==="eventos")el.innerHTML=err+buildEventos();}
function av(l){return "<div class='avatar'>"+l+"</div>";}
function buildGeneral(){var info=nextEventInfo();var isAdmin=state.myName.toLowerCase()==="rodrigo";var statsHtml="<div class='stat-grid'><div class='stat-card'><div class='stat-num'>"+(info.weeks!==null?info.weeks:"&mdash;")+"</div><div class='stat-label'>semanas al proximo evento</div></div><div class='stat-card'><div class='stat-num'>"+info.rehearsalCount+"</div><div class='stat-label'>ensayos agendados</div></div><div class='stat-card'><div class='stat-num'>"+info.totalSongs+"</div><div class='stat-label'>canciones en setlist</div><div class='stat-sub'>"+info.grpLines+"</div></div></div>";if(info.date){statsHtml+="<p style='font-size:13px;color:#666;margin-top:.75rem'>Proximo evento: <strong>"+(info.name||"Sin nombre")+"</strong> &middot; "+fmtDateStr(info.date)+"</p>";}var mHtml=state.loading?"<div class='spin'>Cargando...</div>":state.members.length===0?"<p style='font-size:14px;color:#999'>Nadie registrado aun.</p>":"<div style='display:flex;flex-wrap:wrap;gap:8px;margin-top:.25rem'>"+state.members.map(function(m){var d=m.name||m.id;var isSelf=m.id===state.myName;var isConf=state.confirmRemove===m.id;var tileStyle="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 6px 7px;border-radius:10px;border:1.5px solid "+(isSelf?"#1D9E75":"#e8e8e8")+";background:"+(isSelf?"#F0FDF8":"#fafafa")+";width:82px;position:relative;box-sizing:border-box;overflow:hidden";if(isConf){return "<div style='"+tileStyle+"'><div style='position:absolute;inset:0;background:rgba(255,240,240,0.97);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:1.5px solid #F09595;z-index:2;padding:4px 3px'><p style='font-size:11px;color:#A32D2D;font-weight:600;text-align:center;margin:0;line-height:1.3'>Quitar a<br>"+d+"?</p><div style='display:flex;gap:3px'><button style='font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid #A32D2D;background:#A32D2D;color:#fff;cursor:pointer;font-weight:500' onclick='remov function buildEnsayos(){var isAdmin=state.myName.toLowerCase()==="rodrigo";var calHtml=buildCalTable();return "<div class='card'><div class='stitle'>Disponibilidad por integrante</div>"+(state.members.length===0?"<p style='font-size:14px;color:#999'>Nadie registrado.</p>":state.members.map(function(m){var d=m.name||m.id;return "<div style='display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5'>"+av(d[0].toUpperCase())+"<span style='font-size:14px;font-weight:500;flex:1'>"+d+"</span><button class='btn btns' onclick='viewMember(\""+m.id+"\")'>Ver agenda</button>"+(isAdmin&&m.id!==state.myName?"<button class='btn btns' style='background:#FFF3E0;border-color:#FFCC80;color:#7A4500' onclick='editMember(\""+m.id+"\")'>Editar</button>":"")+"</div>";}).join(""))+"<div class='brow'><button class='btn btnp btns' onclick='goRegister()'>+ Mi disponibilidad</button><button class='btn btns' onclick='loadData()'>&#8635;</button></div></div>"+calHtml+"<div class='card'><div class='stitle'>Ensayos confirmados</div>"+(state.rehearsals.length===0?"<div class='empty'>No hay ensayos confirmados.</div>":state.rehearsals.map(function(r){return "<div class='event-row'><span class='event-date'>"+fmtDateStr(r)+"</span><span class='rehearsal-badge'>Ensayo</span><button class='btn btns btnd' style='margin-left:auto' onclick='unmarkRehearsal(\""+r+"\")'>Quitar</button></div>";}).join(""))+"</div>";}
function buildCalTable(){if(state.members.length===0)return "";var days=getDays();var today=dKey(TODAY);var futureDays=days.filter(function(d){return dKey(d)>=today;});var names=state.members.map(function(m){return m.id;});function countForDay(dk){return names.filter(function(n){var av=state.allData[n];return av&&av[dk]&&av[dk].length>0;}).length;}var total=names.length;var colW=Math.floor(180/total);var out="<div class='card'><div class='stitle'>Disponibilidad por dia</div>";out+="<div style='overflow-x:auto'><div style='max-height:320px;overflow-y:auto'>";out+="<table style='width:100%;border-collapse:collapse;font-size:12px'>";out+="<thead><tr><th style='text-align:left;padding:5px 6px;position:sticky;top:0;background:#fff;border-bottom:2px solid #e8e8e8;min-width:80px'>Dia</th>";names.forEach(function(n){out+="<th style='padding:5px 4px;position:sticky;top:0;background:#fff;border-bottom:2px solid #e8e8e8;text-align:center;min-width:"+colW+"px;font-weight:600'>"+n.split(" ")[0]+"</th>";});out+="<th style='padding:5px 4px;position:sticky;top:0;background:#fff;border-bottom:2px solid #e8e8e8;text-align:center;min-width:70px;font-weight:600'>Ensayo</th>";out+="</tr></thead><tbody>";futureDays.forEach(function(d){var dk=dKey(d);var dow=d.getDay();if(dow===1&&d!==futureDays[0]){out+="<tr><td colspan="+(total+2)+" style='padding:2px 0;background:#f5f5f5'></td></tr>";}var isReh=state.rehearsals.indexOf(dk)>=0;var isEv=state.events.some(function(ev){return ev.date===dk;});var rowBorder=isEv?"3px solid #E65100":isReh?"3px solid #1D9E75":"";var rowBg=isEv?"#FFF3E0":isReh?"#F0FDF8":dk===today?"#F0F7FF":"";var D=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];var M=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];var label=D[d.getDay()]+" "+d.getDate()+" "+M[d.getMonth()];out+="<tr style='background:"+rowBg+";outline:"+rowBorder+";outline-offset:-1px'>";out+="<td style='padding:5px 6px;font-size:11px;color:#555;white-space:nowrap'>"+label+(isEv?" &#127881;":"")+"</td>";names.forEach(function(n){var av=state.allData[n];var hasHours=av&&av[dk]&&av[dk].length>0;var hours=hasHours?av[dk].length:0;var bg=hasHours?(hours>=4?"#1D9E75":hours>=2?"#5DBF9A":"#A8DFCA"):"#f5f5f5";var tc=hasHours?"#fff":"#ddd";out+="<td style='text-align:center;padding:4px 2px'><div style='background:"+bg+";color:"+tc+";border-radius:5px;padding:3px 2px;font-size:11px;font-weight:600'>"+(hasHours?hours+"h":"&middot;")+"</div></td>";});if(isEv){out+="<td style='text-align:center;padding:4px 2px'><span style='font-size:10px;color:#E65100;font-weight:600'>Evento</span></td>";}else if(isReh){out+="<td style='text-align:center;padding:4px 2px'><span style='font-size:10px;color:#1D9E75;font-weight:600'>Agendado</span></td>";}else{out+="<td style='text-align:center;padding:4px 2px'><button class='btn btns' style='font-size:10px;padding:3px 7px' onclick='markRehearsal(\""+dk+"\")'>Agendar</button></td>";}out+="</tr>";});out+="</tbody></table></div></div></div>";return out;}
function buildSetlist(){var total=state.setlist.reduce(function(s,g){return s+g.songs.length;},0);var out="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem'><span style='font-size:13px;color:#666'>"+total+" canciones &middot; "+state.setlist.length+" grupo(s)</span><button class='btn btnp btns' onclick='addGroup()'>+ Nuevo grupo</button></div>";if(state.setlist.length===0){return out+"<div class='empty'>Agrega un grupo para empezar.</div>";}state.setlist.forEach(function(group,gi){var done=group.songs.filter(function(s){return s.done;}).length;out+="<div class='card'><div style='display:flex;align-items:center;gap:8px;padding-bottom:.5rem;border-bottom:1px solid #f0f0f0;margin-bottom:.5rem'><input class='sl-gname' value='"+group.name.replace(/'/g,"&#39;")+"' onchange='updateGroupName("+gi+",this.value)' /><span style='font-size:12px;color:#888;white-space:nowrap'>"+done+"/"+group.songs.length+"</span><button class='btn btns btnd' onclick='removeGroup("+gi+")'>X</button></div>";group.songs.forEach(function(song,si){out+="<div id='sl"+gi+"-"+si+"' class='sl-song"+(song.done?" sl-done":"")+"' draggable=true ondragstart='slDS(event,"+gi+","+si+")' ondragover='return slDO(event,"+gi+","+si+")' ondragleave='slDL("+gi+","+si+")' ondrop='return slDrop(event,"+gi+","+si+")'><span style='color:#ccc;font-size:11px;min-width:18px;text-align:right'>"+(si+1)+"</span><span style='color:#ccc'>&#9776;</span><input type='checkbox' class='sl-chk'"+(song.done?" checked":"")+" onchange='toggleDone("+gi+","+si+")' /><div style='flex:1;min-width:0'><div class='sl-stitle'>"+song.title+"</div>"+(song.artist?"<div class='sl-sartist'>"+song.artist+"</div>":"")+"</div><button class='btn btns btnd' onclick='removeSong("+gi+","+si+")'>X</button></div>";});out+="<div style='display:flex;gap:6px;margin-top:.75rem'><input type='text' id='nst"+gi+"' placeholder='Nombre de la cancion' style='flex:2' onkeydown='if(event.key===\"Enter\")addSong("+gi+")' />< function buildCoincRow(b){var endH=(parseInt(b[b.length-1].hour)+1)%24;var endStr=endH===0?"00:00":endH+":00";var dk=dKey(b[0].date);var isReh=state.rehearsals.indexOf(dk)>=0;var cls=b[0].count>=state.members.length?"bg":b[0].count>=Math.ceil(state.members.length/2)?"ba":"bgr";return "<div class='coinc'><div style='flex:1'><div style='font-size:14px;font-weight:500'>"+fmtDate(b[0].date)+" &middot; "+b[0].hour+":00&ndash;"+endStr+"</div><div class='chips'>"+b[0].members.map(function(m){return"<span class='chip'>"+(m.name||m.id)+"</span>";}).join("")+"</div></div><span class='badge "+cls+"'>"+b[0].count+"/"+state.members.length+"</span>"+(isReh?"<span class='rehearsal-badge'>&#128197; Ensayo</span>":"<button class='btn btns' style='font-size:11px' onclick='markRehearsal(\""+dk+"\")'>Marcar ensayo</button>")+"</div>";}

function buildMemberView(){var id=state.viewingMember;var days=getDays();var weeks=[days.slice(0,7),days.slice(7,14),days.slice(14,21),days.slice(21,28),days.slice(28,35),days.slice(35,42)];var wDays=weeks[state.selectedWeek];var avail=state.allData[id]||{};var body="<div style='display:flex;gap:8px;align-items:center;margin-bottom:1rem'><button class='btn btns' onclick='state.view=\"home\";render()'>&#8592; Volver</button><h2 style='font-size:16px;font-weight:600'>Disponibilidad de "+id+"</h2></div>";body+="<div class='tabs'>";for(var wi=0;wi<6;wi++){body+="<button class='tab"+(state.selectedWeek===wi?" taba":"")+"' onclick='state.selectedWeek="+wi+";render()'>Sem "+(wi+1)+"</button>";}body+="</div><div class='card'>";wDays.forEach(function(d){var dk=dKey(d);var sel=avail[dk]||[];var past=isPastDay(d);var lc=past?"#bbb":"#1a1a1a";body+="<div class='dblock'><div class='dlabel'><span style='color:"+lc+"'>"+fmtDate(d)+"</span></div><div class='hours'>";HOURS.forEach(function(h){var on=sel.indexOf(h)>=0;var cls="hbtn readonly"+(on?" on":"")+(past?" past":"");body+="<button class='"+cls+"' disabled>"+h+"</button>";});body+="</div></div>";});body+="</div>";return body;}
function buildRegister(){var days=getDays();var weeks=[days.slice(0,7),days.slice(7,14),days.slice(14,21),days.slice(21,28),days.slice(28,35),days.slice(35,42)];var wDays=weeks[state.selectedWeek];var hasName=!!state.myName&&!state.editingName;if(state.editingAs){var b2="<div class='admin-banner'><span>&#9997;&#65039; Editando disponibilidad de <strong>"+state.editingAs+"</strong></span><button class='btn btns' onclick='state.editingAs=\"\";state.view=\"home\";render()'>Cancelar</button></div>";b2+="<div class='notice'>Modifica los horarios de "+state.editingAs+" y guarda.</div><div class='tabs'>";for(var wi2=0;wi2<6;wi2++){b2+="<button class='tab"+(state.selectedWeek===wi2?" taba":"")+"' onclick='state.selectedWeek="+wi2+";render()'>Sem "+(wi2+1)+"</button>";}b2+="</div><div class='card'>";wDays.forEach(function(d){var dk2=dKey(d),sel2=state.avail[dk2]||[],past2=isPastDay(d);var lc2=past2?"#bbb":"#1a1a1a";var tb2=past2?"":" <button class='btn btns' onclick='toggleDay(\""+dk2+"\")'>"+(sel2.length===HOURS.length?"Limpiar":"Todo")+"</button>";b2+="<div class='dblock'><div class='dlabel'><span style='color:"+lc2+"'>"+fmtDate(d)+"</span>"+tb2+"</div><div class='hours'>";HOURS.forEach(function(hh){var on2=sel2.indexOf(hh)>=0&&!past2;var isSolo2=on2&&sel2.length===1;var cls2="hbtn"+(isSolo2?" solo":on2?" on":"")+(past2?" past":"");var dis2=past2?" disabled":"";b2+="<button class='"+cls2+"'"+dis2+" onclick='toggleHour(\""+dk2+"\",\""+hh+"\")'>"+hh+"</button>";});b2+="</div></div>";});b2+="</div>"+getSingleHourWarning()+"<div style='display:flex;gap:8px;justify-content:space-between;margin-bottom:1.5rem'><button class='btn' onclick='state.editingAs=\"\";state.view=\"home\";render()'>&#8592; Cancelar</button><button class='btn btnp' onclick='saveAvailability()'"+(state.saving?" disabled":"")+">"+(state.saving?"Guardando...":"Guardar &#10003;")+"</button></div>";return b2;}if(!hasName){var pinErrHtml=state.pinError?"<div class='errbox' style='margin-top:.5rem'>"+state.pinErro +"\")'>"+(sel.length===HOURS.length?"Limpiar":"Todo")+"</button>";body+="<div class='dblock'><div class='dlabel'><span style='color:"+lc+"'>"+fmtDate(d)+"</span>"+tb+"</div><div class='hours'>";HOURS.forEach(function(h){var on=sel.indexOf(h)>=0&&!past;var isSolo=on&&sel.length===1;var cls="hbtn"+(isSolo?" solo":on?" on":"")+(past?" past":"");var dis=past?" disabled":"";body+="<button class='"+cls+"'"+dis+" onclick='toggleHour(\""+dk+"\",\""+h+"\")'>"+h+"</button>";});body+="</div></div>";});body+="</div>"+getSingleHourWarning()+"<div style='display:flex;gap:8px;justify-content:space-between;margin-bottom:1.5rem'><button class='btn' onclick='state.view=\"home\";state.mainTab=\"ensayos\";render()'>&#8592; Volver</button><button class='btn btnp' onclick='saveAvailability()'"+(state.saving?" disabled":"")+">"+(state.saving?"Guardando...":"Guardar disponibilidad &#10003;")+"</button></div>";return body;}
