function buildEventos(){var evHtml=state.events.length===0?"<div class='empty'>"+t('events.noEvents')+"</div>":state.events.map(function(ev){return "<div class='event-row'><span class='event-date'>"+fmtDateStr(ev.date)+"</span><span class='event-name'>"+(ev.name||t('common.noName'))+"</span><button class='btn btns btnd' onclick='removeEvent(\""+ev.date+"\")'>"+t('common.remove')+"</button></div>";}).join("");return "<div class='card'><div class='stitle'>"+t('events.upcoming')+"</div>"+evHtml+"</div><div class='card'><div class='stitle'>"+t('events.add')+"</div><div style='display:flex;flex-direction:column;gap:8px'><input type='date' id='new-event-date' /><input type='text' id='new-event-name' placeholder='"+t('events.namePlaceholder')+"' /><button class='btn btnp btns' onclick='addEvent()'>"+t('events.addBtn')+"</button></div></div>";}
function buildCoincRow(b){var endH=(parseInt(b[b.length-1].hour)+1)%24;var endStr=endH===0?"00:00":endH+":00";var dk=dKey(b[0].date);var isReh=state.rehearsals.indexOf(dk)>=0;var cls=b[0].count>=state.members.length?"bg":b[0].count>=Math.ceil(state.members.length/2)?"ba":"bgr";return "<div class='coinc'><div style='flex:1'><div style='font-size:14px;font-weight:500'>"+fmtDate(b[0].date)+" &middot; "+b[0].hour+":00&ndash;"+endStr+"</div><div class='chips'>"+b[0].members.map(function(m){return"<span class='chip'>"+(m.name||m.id)+"</span>";}).join("")+"</div></div><span class='badge "+cls+"'>"+b[0].count+"/"+state.members.length+"</span>"+(isReh?"<span class='rehearsal-badge'>&#128197; Ensayo</span>":"<button class='btn btns' style='font-size:11px' onclick='markRehearsal(\""+dk+"\")'>Marcar ensayo</button>")+"</div>";}

function buildMemberView(){var id=state.viewingMember;var days=getDays();var weeks=[days.slice(0,7),days.slice(7,14),days.slice(14,21),days.slice(21,28),days.slice(28,35),days.slice(35,42)];var wDays=weeks[state.selectedWeek];var avail=state.allData[id]||{};var body="<div style='display:flex;gap:8px;align-items:center;margin-bottom:1rem'><button class='btn btns' onclick='state.view=\"home\";render()'>&#8592; "+t('common.back')+"</button><h2 style='font-size:16px;font-weight:600'>"+t('memberView.availabilityOf')+" "+id+"</h2></div>";body+="<div class='tabs'>";for(var wi=0;wi<6;wi++){body+="<button class='tab"+(state.selectedWeek===wi?" taba":"")+"' onclick='state.selectedWeek="+wi+";render()'>"+t('common.week')+" "+(wi+1)+"</button>";}body+="</div><div class='card'>";wDays.forEach(function(d){var dk=dKey(d);var sel=avail[dk]||[];var past=isPastDay(d);var lc=past?"#bbb":"#1a1a1a";body+="<div class='dblock'><div class='dlabel'><span style='color:"+lc+"'>"+fmtDate(d)+"</span></div><div class='hours'>";HOURS.forEach(function(h){var on=sel.indexOf(h)>=0;var cls="hbtn readonly"+(on?" on":"")+(past?" past":"");body+="<button class='"+cls+"' disabled>"+h+"</button>";});body+="</div></div>";});body+="</div>";return body;}
function buildRegister(){var days=getDays();var weeks=[days.slice(0,7),days.slice(7,14),days.slice(14,21),days.slice(21,28),days.slice(28,35),days.slice(35,42)];var wDays=weeks[state.selectedWeek];var hasName=!!state.myName&&!state.editingName;if(state.editingAs){var b2="<div class='admin-banner'><span>&#9997;&#65039; "+t('register.editingAvail')+" <strong>"+state.editingAs+"</strong></span><button class='btn btns' onclick='state.editingAs=\"\";state.view=\"home\";render()'>"+t('common.cancel')+"</button></div>";b2+="<div class='notice'>"+t('register.modifyHours')+" "+state.editingAs+".</div><div class='tabs'>";for(var wi2=0;wi2<6;wi2++){b2+="<button class='tab"+(state.selectedWeek===wi2?" taba":"")+"' onclick='state.selectedWeek="+wi2+";render()'>"+t('common.week')+" "+(wi2+1)+"</button>";}b2+="</div><div class='card'>";wDays.forEach(function(d){var dk2=dKey(d),sel2=state.avail[dk2]||[],past2=isPastDay(d);var lc2=past2?"#bbb":"#1a1a1a";var tb2=past2?"":" <button class='btn btns' onclick='toggleDay(\""+dk2+"\")'>"+(sel2.length===HOURS.length?t('common.clear'):t('common.all'))+"</button>";b2+="<div class='dblock'><div class='dlabel'><span style='color:"+lc2+"'>"+fmtDate(d)+"</span>"+tb2+"</div><div class='hours'>";HOURS.forEach(function(hh){var on2=sel2.indexOf(hh)>=0&&!past2;var isSolo2=on2&&sel2.length===1;var cls2="hbtn"+(isSolo2?" solo":on2?" on":"")+(past2?" past":"");var dis2=past2?" disabled":"";b2+="<button class='"+cls2+"'"+dis2+" onclick='toggleHour(\""+dk2+"\",\""+hh+"\")'>"+hh+"</button>";});b2+="</div></div>";});b2+="</div>"+getSingleHourWarning()+"<div style='display:flex;gap:8px;justify-content:space-between;margin-bottom:1.5rem'><button class='btn' onclick='state.editingAs=\"\";state.view=\"home\";render()'>&#8592; "+t('common.cancel')+"</button><button class='btn btnp' onclick='saveAvailability()'"+(state.saving?" disabled":"")+">"+(state.saving?t('common.saving'):t('common.save')+" &#10003;")+"</button></div>";return b2;}if(!hasName){var pinErrHtml=state.pinError?"<div class='errbox' style='margin-top:.5rem'>"+state.pinError+"</div>":"";return "<div class='card'><div class='stitle'>"+t('register.yourName')+"</div><div style='margin-bottom:.75rem'><input type='text' id='name-input' placeholder='"+t('register.namePlaceholder')+"' value='"+state.myName+"' /></div><div class='pinbox'><strong>&#128274; "+t('register.alreadyRegistered')+"</strong> "+t('register.recoverProfile')+"<div style='display:flex;gap:8px;margin-top:.75rem'><input type='text' id='pin-name' placeholder='"+t('register.nameLabel')+"' style='flex:1' /><input type='password' id='pin-code' placeholder='"+t('register.pinLabel')+"' style='flex:1' /><button class='btn btnp btns' onclick='verifyPin()'>"+t('register.login')+"</button></div></div>"+pinErrHtml+"<div class='brow'><button class='btn btnp btns' onclick='setName()'>"+t('register.newRegister')+"</button></div></div>";}var body="<div class='card'><div class='stitle'>"+t('register.yourName')+"</div><div style='display:flex;align-items:center;gap:10px'>"+av(state.myName[0].toUpperCase(),state.myName)+"<span style='font-size:16px;font-weight:500'>"+state.myName+"</span>"+(state.myPin?"<span style='font-size:11px;background:#E1F5EE;padding:2px 8px;border-radius:20px;color:#085041'>&#128274; "+t('register.pinActive')+"</span>":"")+"<button class='btn btns' onclick='logout()'>"+t('common.change')+"</button></div>"+(state.myPin?"":"<div class='pinbox'><strong>&#128274; "+t('register.createPin')+"</strong> "+t('register.fromOtherDevices')+"<div style='display:flex;gap:8px;margin-top:.5rem'><input type='password' id='new-pin' placeholder='"+t('register.pinMin')+"' style='flex:1' /><button class='btn btnp btns' onclick='savePin()'>"+t('register.savePin')+"</button></div></div>")+"</div>";body+="<div class='notice'>"+t('register.toggleHelp')+"</div><div class='tabs'>";for(var wi=0;wi<6;wi++){body+="<button class='tab"+(state.selectedWeek===wi?" taba":"")+"' onclick='state.selectedWeek="+wi+";render()'>"+t('common.week')+" "+(wi+1)+"</button>";}body+="</div><div class='card'>";wDays.forEach(function(d){var dk=dKey(d),sel=state.avail[dk]||[],past=isPastDay(d);var lc=past?"#bbb":"#1a1a1a";var tb=past?"":" <button class='btn btns' onclick='toggleDay(\""+dk+"\")'>"+(sel.length===HOURS.length?t('common.clear'):t('common.all'))+"</button>";body+="<div class='dblock'><div class='dlabel'><span style='color:"+lc+"'>"+fmtDate(d)+"</span>"+tb+"</div><div class='hours'>";HOURS.forEach(function(h){var on=sel.indexOf(h)>=0&&!past;var isSolo=on&&sel.length===1;var cls="hbtn"+(isSolo?" solo":on?" on":"")+(past?" past":"");var dis=past?" disabled":"";body+="<button class='"+cls+"'"+dis+" onclick='toggleHour(\""+dk+"\",\""+h+"\")'>"+h+"</button>";});body+="</div></div>";});body+="</div>"+getSingleHourWarning()+"<div style='display:flex;gap:8px;justify-content:space-between;margin-bottom:1.5rem'><button class='btn' onclick='state.view=\"home\";state.mainTab=\"ensayos\";render()'>&#8592; "+t('common.back')+"</button><button class='btn btnp' onclick='saveAvailability()'"+(state.saving?" disabled":"")+">"+(state.saving?t('common.saving'):t('register.saveAvailability')+" &#10003;")+"</button></div>";return body;}
function getSingleHourWarning(){var days=Object.keys(state.avail).filter(function(dk){return state.avail[dk]&&state.avail[dk].length===1;});if(days.length===0)return "";var labels=days.map(function(dk){var d=new Date(dk+"T12:00:00");return fmtDate(d);});return "<div style='background:#FFF3E0;border:1px solid #FFCC80;border-radius:8px;padding:10px 14px;font-size:13px;color:#7A4500;margin-bottom:.75rem'>&#9888;&#65039; "+t('register.singleHourWarning')+" <strong>"+labels.join(", ")+"</strong>. "+t('register.singleHourSuffix')+"</div>";}
